name: pip Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pip-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Smoke test (import and version check)
        run: python3 -c "import get; print('get v' + get.VERSION)"

      - name: Smoke test CLI entry point (--help exits 0)
        run: get --help
